name: Integration Tests - Examples

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  examples-non-qt:
    name: Test examples (non-Qt/non-package subset)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          submodules: true
      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --group dev
      - name: Run non-Qt/non-package example integration subset
        run: python -m pytest tests/test_examples_integration.py -k "not qt and not package"